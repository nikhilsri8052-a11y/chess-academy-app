{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-card">
<h2>Create your account</h2>
<div id="error-box" class="form-error" style="display:none"></div><div id="success-box" class="form-success" style="display:none"></div>
<form id="register-form" class="auth-form" novalidate>
<input type="text" id="name" name="name" placeholder="Full name" required>
<input type="email" id="email" name="email" placeholder="Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>
<input type="tel" id="phone" name="phone" placeholder="Phone" required>
<input type="number" id="age" name="age" placeholder="Age" required>
<input type="text" id="parent_name" name="parent_name" placeholder="Parent name" required>
<input type="number" id="rating" name="rating" placeholder="Rating (optional)">
<button type="submit" id="register-btn" class="btn-submit"><span id="btn-text">Create Account</span><div id="btn-spinner" class="spinner"></div></button>
</form>
</div>
{% endblock %}
{% block scripts %}<script type="module" src="{{ url_for('static', filename='js/student_register.js') }}"></script>{% endblock %}
