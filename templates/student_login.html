{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="auth-card">
<h2>Welcome back</h2><p>Login to continue.</p>
<div id="error" class="form-error"></div>
<form id="login-form" class="auth-form">
<input id="email" type="email" placeholder="Email" autocomplete="username">
<input id="password" type="password" placeholder="Password" autocomplete="current-password">
<button id="student-login-btn" class="btn-submit">Login</button>
</form>
<p>New here? <a href="/student/register">Create account</a></p>
</div>
{% endblock %}
{% block scripts %}<script type="module" src="{{ url_for('static', filename='js/student_login.js') }}"></script>{% endblock %}
